<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 도메인 닷컴 | 공식 페이지</title>
    <style>
      :root {
        --primary-color: #00c73c; /* 네이버웍스 느낌의 포인트 컬러 */
        --bg-color: #f8f9fa;
        --text-color: #333;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }

      .container {
        background: white;
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        max-width: 500px;
        width: 90%;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        color: #222;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.6;
        color: #666;
        margin-bottom: 2rem;
      }

      .contact-button {
        display: inline-block;
        background-color: var(--primary-color);
        color: white;
        padding: 12px 30px;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
        transition:
          transform 0.2s,
          background-color 0.2s;
      }

      .contact-button:hover {
        background-color: #00a832;
        transform: translateY(-2px);
      }

      footer {
        margin-top: 2rem;
        font-size: 0.9rem;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome!</h1>
      <p>
        현재 이 페이지는 <strong>Cloudflare</strong>와
        <strong>GitHub Pages</strong>를 통해 안전하게 서빙되고 있습니다.
      </p>
      <!-- 네이버웍스로 설정한 본인의 메일 주소를 넣어보세요 -->
      <a href="mailto:admin@내도메인.com" class="contact-button"
        >이메일 문의하기</a
      >

      <footer>© 2026 내 도메인 닷컴. All rights reserved.</footer>
    </div>
  </body>
</html>
